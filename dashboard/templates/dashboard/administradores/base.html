{% load static tailwind_tags %} 
{% load static %}
<!DOCTYPE html>
<html data-theme="healenth" lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="{% static 'datatables.net-dt/css/dataTables.dataTables.css' %}">
    <link rel="stylesheet" href="{% static 'datatables.net-rowgroup-dt/css/rowGroup.dataTables.css' %}">
    <script src="{% static 'jquery/dist/jquery.min.js'%}"></script>
    <script src="{% static 'js/datatable.js' %}"></script>
    <script src="{% static 'datatables.net/js/dataTables.min.js' %}"></script> 
    <script src="{% static 'datatables.net-rowgroup/js/dataTables.rowGroup.min.js' %}"></script>
    {% tailwind_css %}
  </head>
  <body>
    <section class="header">
      <header>
        <div class="navbar bg-base-200 shadow-sm">
          <div class="navbar-start">
            <a href="/" class="btn-ghost inline-flex">
              <img src="{{'/media/logo1.webp'}}" alt="Healenth" width="110">
            </a>
          </div>
          <div class="navbar-end gap-x-2"></div>
        </div>
      </header>
    </section>
    <aside>
      <div class="sidenav">
        <div class="drawer drawer-open">
          <input id="my-drawer-2" type="checkbox" class="drawer-toggle" />
          <div class="drawer-content flex flex-col min-h-screen bg-base-100 border-base-300 border shadow-lg ">
            <main class="main flex-auto p-4"> {% block main %} {% endblock %} </main>
          </div>
          <div class="drawer-side bg-base-200 border-base-300 border shadow-lg">
            <label for="my-drawer-2" aria-label="close sidebar" class="drawer-overlay"></label>
            <ul class="menu bg-base-200 text-base-content p-4 w-64 overflow-y-auto">
              <h5 class="text-base font-semibold">Menu</h5>
              <br>
              <li>
                <a href="/dashboard/administrador">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-4">
                    <path d="M11.47 3.841a.75.75 0 0 1 1.06 0l8.69 8.69a.75.75 0 1 0 1.06-1.061l-8.689-8.69a2.25 2.25 0 0 0-3.182 0l-8.69 8.69a.75.75 0 1 0 1.061 1.06l8.69-8.689Z" />
                    <path d="m12 5.432 8.159 8.159c.03.03.06.058.091.086v6.198c0 1.035-.84 1.875-1.875 1.875H15a.75.75 0 0 1-.75-.75v-4.5a.75.75 0 0 0-.75-.75h-3a.75.75 0 0 0-.75.75V21a.75.75 0 0 1-.75.75H5.625a1.875 1.875 0 0 1-1.875-1.875v-6.198a2.29 2.29 0 0 0 .091-.086L12 5.432Z" />
                  </svg> Início </a>
              </li>
              <li>
                <a href="/dashboard/administrador/agendamentos">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-4">
                    <path d="M12.75 12.75a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0ZM7.5 15.75a.75.75 0 1 0 0-1.5.75.75 0 0 0 0 1.5ZM8.25 17.25a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0ZM9.75 15.75a.75.75 0 1 0 0-1.5.75.75 0 0 0 0 1.5ZM10.5 17.25a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0ZM12 15.75a.75.75 0 1 0 0-1.5.75.75 0 0 0 0 1.5ZM12.75 17.25a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0ZM14.25 15.75a.75.75 0 1 0 0-1.5.75.75 0 0 0 0 1.5ZM15 17.25a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0ZM16.5 15.75a.75.75 0 1 0 0-1.5.75.75 0 0 0 0 1.5ZM15 12.75a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0ZM16.5 13.5a.75.75 0 1 0 0-1.5.75.75 0 0 0 0 1.5Z" />
                    <path fill-rule="evenodd" d="M6.75 2.25A.75.75 0 0 1 7.5 3v1.5h9V3A.75.75 0 0 1 18 3v1.5h.75a3 3 0 0 1 3 3v11.25a3 3 0 0 1-3 3H5.25a3 3 0 0 1-3-3V7.5a3 3 0 0 1 3-3H6V3a.75.75 0 0 1 .75-.75Zm13.5 9a1.5 1.5 0 0 0-1.5-1.5H5.25a1.5 1.5 0 0 0-1.5 1.5v7.5a1.5 1.5 0 0 0 1.5 1.5h13.5a1.5 1.5 0 0 0 1.5-1.5v-7.5Z" clip-rule="evenodd" />
                  </svg>
                  </svg> Agendamentos </a>
              </li>
              <li>
                <a href="/dashboard/administrador/lista">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-4">
                    <path fill-rule="evenodd" d="M10.5 3.75a6.75 6.75 0 1 0 0 13.5 6.75 6.75 0 0 0 0-13.5ZM2.25 10.5a8.25 8.25 0 1 1 14.59 5.28l4.69 4.69a.75.75 0 1 1-1.06 1.06l-4.69-4.69A8.25 8.25 0 0 1 2.25 10.5Z" clip-rule="evenodd" />
                  </svg> Lista </a>
            </ul>
          </div>
        </div>
    </aside>
  </body>
</html>
