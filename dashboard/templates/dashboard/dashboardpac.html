<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js" integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<style>
    .navbar-toggler{
        position: fixed;
    }
    .nav-item:hover{
      background-color: #e6e6e6;
      border-left: 3px solid wheat;
    }
</style>
<body>
    <nav class="navbar bg-body-tertiary fixed-top">
        <div class="container-fluid">
          <a class="navbar-brand" href="#" style="margin-left: 80px;">Healenth</a>
          <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasNavbar" aria-controls="offcanvasNavbar" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="offcanvas offcanvas-start" tabindex="-1" id="offcanvasNavbar" aria-labelledby="offcanvasNavbarLabel">
            <div class="offcanvas-header">
              <h5 class="offcanvas-title" id="offcanvasNavbarLabel">Menu</h5>
              <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
            </div>
            <div class="offcanvas-body" style="margin-left: 10px;">
              <ul class="navbar-nav justify-content-end flex-grow-1 pe-3"><br>
                <li class="nav-item">
                  <a class="nav-link active" aria-current="page" href="/dashboard/pacientes/" style="margin-left: 10px;">Inicio</a>
                </li>
                <li class="nav-item">
                  <a class="nav-link active" href="#" style="margin-left: 10px; margin-bottom: 10px;">Agendamentos</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="#" style="margin-left: 10px; margin-bottom: 10px;">Médicos</a>
                  </li>
                  <li class="nav-item">
                    <a class="nav-link active" href="#" style="margin-left: 10px; margin-bottom: 10px;">Configurações</a>
                  </li>
                <li class="nav-item dropdown">

              </ul>
              <form action="{% url 'users:logout' %}" method="post">
                {% csrf_token %}
                <button action="{% url 'users:logout' %}" method="post" style="border: 0; background-color: white;">Logout</button>
            </form> 
            </div>
          </div>
        </div>
      </nav>
      <br>
</div>
</body>
</html>
