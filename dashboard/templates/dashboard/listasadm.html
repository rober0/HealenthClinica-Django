<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Healenth</title>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.datatables.net/2.3.1/js/dataTables.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <link rel="stylesheet" href="https://cdn.datatables.net/2.3.1/css/dataTables.dataTables.css" />
    <link rel="stylesheet" href="/static/css/dashboard.css">
    <link rel="script" href="/static/js/dashboard.js">
  </head>
  <body>
    <header>
      <div class="topnav">
        <a href="/">
          <img src="{{'/media/logo3.png'}}" alt="Healenth" width="100">
        </a>
        <div class="dropdown">
          <button onclick="myFunction()" class="dropbtn">
            <i class="fa-solid fa-user"></i>
          </button>
          <div id="myDropdown" class="dropdown-content">
            <a href="#">Link 1</a>
            <a href="#">Link 2</a>
            <a href="#">Link 3</a>
          </div>
        </div>
      </div>
    </header>
    <aside>
      <div class="sidenav">
        <h5>Menu</h5>
        <a class="active" href="/dashboard/administrador">
          <i class="fa fa-fw fa-home"></i>
          <span>Inicio</span>
        </a>
        <a href="/dashboard/administrador/agendamentos">
          <i class="fa fa-fw fa-search"></i>
          <span>Agendamentos</span>
        </a>
        <a href="/dashboard/administrador/lista">
          <i class="fa fa-fw fa-user-doctor"></i>
          <span>Lista</span>
        </a>
      </div>
    </aside>
    <main class="main">
      <h1>Lista de Usuários</h1>
        <table id="myTable" class="display">
    <thead>
        <tr>
            <th>Nome</th>
            <th>Email</th>
            <th>Grupo</th>
        </tr>
    </thead>
    <tbody>
         {% for usuario in usuarios %}
              <tr>
                <td>{{ usuario.username }}</td>
                <td>{{ usuario.email }}</td>
                <td>{{ usuario.groups.first.name }}</td>
              </tr>
            {% endfor %}
        </tr>
    </tbody>
</table>
    </main>
  </body>
  <script>
    function myFunction() {
      document.getElementById("myDropdown").classList.toggle("show");
    }
    window.onclick = function(event) {
      if (!event.target.matches('.dropbtn')) {
        var dropdowns = document.getElementsByClassName("dropdown-content");
        var i;
        for (i = 0; i < dropdowns.length; i++) {
          var openDropdown = dropdowns[i];
          if (openDropdown.classList.contains('show')) {
            openDropdown.classList.remove('show');
          }
        }
      }
    }
  </script>
  <script>
    $(document).ready( function () {
    $('#myTable').DataTable();
    
} );
  </script>
</html>
