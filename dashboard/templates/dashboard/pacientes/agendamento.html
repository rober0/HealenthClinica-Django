<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Healenth</title>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.17/index.global.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <link rel="stylesheet" type="text/css" href="/static/css/dashboard.css" />
    <style>

      .dropbtn {
        background-color: #06a4c0;
        color: white;
        padding: 10px 15px;
        font-size: 16px;
        border: none;
        cursor: pointer;
      }

      .dropdown {
        position: relative;
        display: inline-block;
      }

      .dropdown-content {
        display: none;
        position: absolute;
        background-color: #f9f9f9;
        min-width: 160px;
        box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
        z-index: 1;
      }

      .dropdown-content a {
        color: black;
        padding: 12px 16px;
        text-decoration: none;
        display: block;
      }

      .dropdown-content a:hover {
        background-color: #ddd;
      }

      .show {
        display: block;
      }
      .container {
        width: 100%;
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px;
      }
      .calendar {
        width: 100%;
        height: 100%;
      }

    </style>
  </head>
  <body>
    <header>
      <div class="topnav">
        <a href="/">
          <img src="{{'/media/logo2.png'}}" alt="Healenth" width="100">
        </a>
        <div class="dropdown">
          <button onclick="myFunction()" class="dropbtn">
            <i class="fa-solid fa-user"></i>
          </button>
          <div id="myDropdown" class="dropdown-content">
            <a href="#">Link 1</a>
            <a href="#">Link 2</a>
            <form action="{% url 'users:logout' %}" method="post" style="margin: 2px 2px 5px 10px;">
              {% csrf_token %}
              <button action="{% url 'users:logout' %}" method="post" style="border: 0;">Logout</button>
          </div>
        </div>
      </div>
    </header>
    <aside>
      <div class="sidenav">
        <h5>Menu</h5>
        <a class="active" href="/dashboard/pacientes">
          <i class="fa fa-fw fa-home"></i>
          <span>Inicio</span>
        </a>
        <a href="/dashboard/pacientes/agendamentos">
          <i class="fa fa-fw fa-search"></i>
          <span>Agendamentos</span>
        </a>
        <a href="/dashboard/pacientes/medicos">
          <i class="fa fa-fw fa-user-doctor"></i>
          <span>Médicos</span>
        </a>
      </div>
    </aside>
    <main class="main">
      <div id="calendar" class="container">
        <div id='calendar' class="calendar"></div>
      </div>
    </main>
  </body>
  <script>
    function myFunction() {
      document.getElementById("myDropdown").classList.toggle("show");
    }
    window.onclick = function(event) {
      if (!event.target.matches('.dropbtn')) {
        var dropdowns = document.getElementsByClassName("dropdown-content");
        var i;
        for (i = 0; i < dropdowns.length; i++) {
          var openDropdown = dropdowns[i];
          if (openDropdown.classList.contains('show')) {
            openDropdown.classList.remove('show');
          }
        }
      }
    }

    document.addEventListener('DOMContentLoaded', function() {
        var calendarEl = document.getElementById('calendar');
        var calendar = new FullCalendar.Calendar(calendarEl, {
          initialView: 'dayGridMonth', 
          locale: 'pt-br',
          buttonText: {
            today: 'Hoje',
            month: 'Mês',
            week: 'Semana',
            day: 'Dia'
          },
          headerToolbar: {
            left: 'prev,next today',
            center: 'title',
            right: 'dayGridMonth,timeGridWeek,timeGridDay'
          },
        });
        calendar.render();
        
      });
  </script>
</html>
