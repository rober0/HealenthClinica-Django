<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Healenth</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/cdn/themes/light.css" />
    <script type="module" src="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/cdn/shoelace-autoloader.js"></script>
    <link rel="stylesheet" type="text/css" href="/static/css/form.css" />
    <style>
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card" style="border-radius: 1rem;">
        <div class="row g-0">
          <div class="col-md-6 col-lg-7 d-flex align-items-center">
            <div class="card-body p-4 p-lg-5 text-black">
              <form method="post">
               {% csrf_token %}
                <h5 class="fw-normal mb-3 pb-3" style="letter-spacing: 1px;">Acesse a Sua Conta</h5>
                <div>
                  <label class="form-label" for="email">Email</label>
                  {{ form.email }}
                </div>
                <br>
                <div>
                  <label class="form-label" for="password">Senha</label>
                  {{ form.password }}
                </div>
                <span class="password-icon" onclick="togglePassword()" style="cursor:pointer;">
                  <i class="fas fa-eye"></i>
                </span>
                <br>
                <input class="btn btn-primary btn-lg" type="submit" value="Enviar" name="submit" />
                <br>
                <br>
              </form> 
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
  <script src="/static/js/form.js"></script>
</html>
