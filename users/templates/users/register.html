<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Healenth</title>
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" rel="stylesheet" />
    <!-- MDB -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/mdb-ui-kit/8.2.0/mdb.min.css" rel="stylesheet" />
    <link rel="stylesheet" type="text/css" href="/static/css/form.css" />
  </head>
  <body>
    <div class="container">
      <div class="card" style="border-radius: 1rem;">
        <div class="row g-0">
          <div class="col-md-6 col-lg-7 d-flex align-items-center">
            <div class="card-body p-4 p-lg-5 text-black">
              <form method="post">
                {% csrf_token %}
                 <h5 class="fw-normal mb-3 pb-3" style="letter-spacing: 1px;">Registre-se</h5>
                <div>
                  <label class="form-label" for="nome">Nome</label>
                  {{ form.username }}
                </div>
                <br>
                <div>
                  <label class="form-label" for="email">Email</label>
                  {{ form.email }}
                </div>
                <br>
                <div>
                  <label class="form-label" for="senha">Senha</label>
                  {{ form.password }}
                </div>
                <br>
                <div>
                  <label class="form-label" for="confirmsenha">Confirme a Senha</label>
                  {{ form.password_confirm }}
                </div>
                <span class="password-icon" onclick="togglePassword2()" style="cursor:pointer;"><i class="fas fa-eye"></i></span>
                  <span class="password-icon2" onclick="togglePassword()" style="cursor:pointer;"><i class="fas fa-eye"></i></span>
                  <br>
                  <input class="btn btn-primary btn-lg" type="submit" value="Enviar" name="submit" />
                </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
  <script src="/static/js/form.js"></script>
</html>
